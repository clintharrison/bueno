device:
  - name: "(?i)^8BitDo.*gamepad$"
    mac: e4:17:d8:0a:b0:0c
    bind:
      PageUp: prev_page
      PageDown: next_page
      G: next_page # A button
      # you can also disambiguate between KEY_B and BTN_B if you want
      KEY_J: next_page # B button
      H: prev_page # X button
      I: prev_page # Y button

      # D pad
      C: rotate_ccw # Up
      D: rotate_cw # down

      N: brightness_down # minus
      O: brightness_up # plus

      L: warmth_down # L2
      R: warmth_up # R2

  - name: "(?i)^8BitDo.*gamepad$"
    mac: e4:17:d8:33:22:11
    bind:
      PageUp: prev_page
      PageDown: next_page
      A: next_page
      BTN_B: next_page
      X: prev_page
      Y: prev_page
      Start: brightness_up
      Select: brightness_down
      TL2: warmth_down
      TR2: warmth_up
      # D pad
      DPad_Up: rotate_ccw
      DPad_Down: rotate_cw
